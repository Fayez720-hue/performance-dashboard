<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanShift Performance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* WATERMARK BACKGROUND */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url('CANSHIFTTT-02.png');
            background-repeat: repeat;
            background-size: 150px;
            opacity: 0.08;
            pointer-events: none;
            z-index: 0;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 25px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 18px;
            padding: 10px;
            transition: transform 0.2s ease;
            min-width: 80px;
            min-height: 80px;
        }

        .company-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        /* Logo placeholder styling */
        .logo-placeholder {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .title-text h1 {
            color: #333;
            font-size: 2.3em;
            margin-bottom: 6px;
        }

        .title-text p {
            color: #666;
            font-size: 1em;
        }

        .brand-badge {
            background: #f0f2ff;
            padding: 8px 18px;
            border-radius: 40px;
            color: #667eea;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
        }

        .kpi-card h3 {
            color: #666;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .filter-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .filter-title {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .filter-controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        select, button {
            padding: 10px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        select {
            background: white;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
        }

        button:hover {
            background: #5a67d8;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .chart-card h3 {
            margin-bottom: 20px;
            color: #333;
        }

        canvas {
            max-height: 400px;
        }

        .table-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            font-weight: bold;
        }

        .score-high { color: #10b981; font-weight: bold; }
        .score-medium { color: #f59e0b; font-weight: bold; }
        .score-low { color: #ef4444; font-weight: bold; }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            transition: width 0.3s ease;
        }

        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .title-text h1 { font-size: 1.8em; }
            .company-logo { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <div class="header-left">
                <div class="logo-wrapper" id="logoContainer">
                    <!-- Logo will be loaded here with JavaScript for better error handling -->
                </div>
                <div class="title-text">
                    <h1>🏃‍♂️ CanShift Performance Dashboard</h1>
                    <p>Interactive Analytics & Employee Performance Tracking</p>
                </div>
            </div>
            <div class="brand-badge">
                ⚡ CanShift Analytics • Enterprise
            </div>
        </div>

        <div class="kpi-grid" id="kpiGrid"></div>

        <div class="filter-section">
            <div class="filter-title">🔍 Filter & Sort</div>
            <div class="filter-controls">
                <select id="sortBy">
                    <option value="name">Sort by Name</option>
                    <option value="score">Sort by Score</option>
                    <option value="tasks">Sort by Tasks</option>
                    <option value="adherence">Sort by Adherence</option>
                </select>
                <select id="filterTitle">
                    <option value="all">All Titles</option>
                    <option value="Content creator">Content Creator</option>
                    <option value="Media buyer">Media Buyer</option>
                    <option value="Videographer">Videographer</option>
                    <option value="Graphic designer">Graphic Designer</option>
                </select>
                <button onclick="applyFilters()">Apply Filters</button>
                <button onclick="resetFilters()">Reset</button>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>📊 Employee Performance Score</h3>
                <canvas id="scoreChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>🎯 Tasks Completed vs Score</h3>
                <canvas id="tasksVsScoreChart"></canvas>
            </div>
        </div>

        <div class="charts-grid">
            <div class="chart-card">
                <h3>📈 Adherence Rate by Employee</h3>
                <canvas id="adherenceChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>🏆 Top Performers</h3>
                <canvas id="topPerformersChart"></canvas>
            </div>
        </div>

        <div class="table-section">
            <h3>👥 Employee Ranking Details</h3>
            <div id="employeeTable"></div>
        </div>
    </div>

    <script>
        // Try to load logo with multiple filename attempts
        function loadLogo() {
            const logoContainer = document.getElementById('logoContainer');
            const possibleNames = [
                'CANSHIFTTT-02.png',
                'canshifttt-02.png',
                'CANSHIFTTT-02.PNG',
                'logo.png',
                'CANSHIFTTT-02.png?raw=true'
            ];

            let attempted = 0;

            function tryNextName() {
                if (attempted >= possibleNames.length) {
                    // All attempts failed, show placeholder
                    logoContainer.innerHTML = '<div class="logo-placeholder">CS</div>';
                    return;
                }

                const img = new Image();
                img.onload = function() {
                    // Logo loaded successfully
                    logoContainer.innerHTML = `<img class="company-logo" src="${possibleNames[attempted]}" alt="CanShift Logo">`;
                };
                img.onerror = function() {
                    // Try next filename
                    attempted++;
                    tryNextName();
                };
                img.src = possibleNames[attempted];
            }

            tryNextName();
        }

        // Employee data
        let employees = [
            { name: "Amira Sobhy", title: "Content creator", tasks: 2, score: 99.98, adherence: 70.81 },
            { name: "Mohamed Abdel Sattar", title: "Media buyer", tasks: 1, score: 90.00, adherence: 63.05 },
            { name: "Obada Hisham", title: "Videographer", tasks: 3, score: 65.00, adherence: 64.22 },
            { name: "Haneen Abdel Fattah", title: "Graphic designer", tasks: 1, score: 10.00, adherence: 66.23 }
        ];

        let currentEmployees = [...employees];
        let charts = {};

        function getScoreClass(score) {
            if (score >= 80) return 'score-high';
            if (score >= 50) return 'score-medium';
            return 'score-low';
        }

        function updateKPIs() {
            const totalEmployees = currentEmployees.length;
            const avgScore = (currentEmployees.reduce((sum, emp) => sum + emp.score, 0) / totalEmployees).toFixed(2);
            const totalTasks = currentEmployees.reduce((sum, emp) => sum + emp.tasks, 0);
            const avgAdherence = (currentEmployees.reduce((sum, emp) => sum + parseFloat(emp.adherence), 0) / totalEmployees).toFixed(2);
            const topPerformer = currentEmployees.reduce((max, emp) => emp.score > max.score ? emp : max, currentEmployees[0]);

            document.getElementById('kpiGrid').innerHTML = `
                <div class="kpi-card"><h3>Total Employees</h3><div class="kpi-value">${totalEmployees}</div></div>
                <div class="kpi-card"><h3>Average Score</h3><div class="kpi-value">${avgScore}%</div></div>
                <div class="kpi-card"><h3>Total Tasks</h3><div class="kpi-value">${totalTasks}</div></div>
                <div class="kpi-card"><h3>Average Adherence</h3><div class="kpi-value">${avgAdherence}%</div></div>
                <div class="kpi-card"><h3>🏆 Top Performer</h3><div class="kpi-value">${topPerformer.name}</div><div style="font-size:0.9em;color:#666;">${topPerformer.score}%</div></div>

        }

        function renderTable() {
            document.getElementById('employeeTable').innerHTML = `
                <table>
                    <thead>
                        <tr><th>Name</th><th>Title</th><th>No. of Tasks</th><th>Score</th><th>Adherence</th><th>Performance</th></tr>
                    </thead>
                    <tbody>
                        ${currentEmployees.map(emp => `
                            <tr>
                                <td><strong>${emp.name}</strong></td>
                                <td>${emp.title}</td>
                                <td>${emp.tasks}</td>
                                <td class="${getScoreClass(emp.score)}">${emp.score}%</td>
                                <td>${emp.adherence}%</td>
                                <td><div class="progress-bar"><div class="progress-fill" style="width: ${emp.score}%"></div></div></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function updateCharts() {
            const names = currentEmployees.map(emp => emp.name);
            const scores = currentEmployees.map(emp => emp.score);
            const tasks = currentEmployees.map(emp => emp.tasks);
            const adherence = currentEmployees.map(emp => emp.adherence);
            const colors = ['#667eea', '#764ba2', '#f59e0b', '#10b981'];

            if (charts.scoreChart) charts.scoreChart.destroy();
            charts.scoreChart = new Chart(document.getElementById('scoreChart'), {
                type: 'bar',
                data: { labels: names, datasets: [{ label: 'Performance Score (%)', data: scores, backgroundColor: colors, borderRadius: 10 }] },
                options: { responsive: true, scales: { y: { beginAtZero: true, max: 100 } } }
            });

            if (charts.tasksVsScoreChart) charts.tasksVsScoreChart.destroy();
            charts.tasksVsScoreChart = new Chart(document.getElementById('tasksVsScoreChart'), {
                type: 'scatter',
                data: { datasets: [{ label: 'Tasks vs Score', data: currentEmployees.map(emp => ({ x: emp.tasks, y: emp.score })), backgroundColor: '#667eea', pointRadius: 8 }] },
                options: { scales: { x: { title: { display: true, text: 'Tasks' }, stepSize: 1 }, y: { title: { display: true, text: 'Score (%)' }, max: 100 } } }
            });

            if (charts.adherenceChart) charts.adherenceChart.destroy();
            charts.adherenceChart = new Chart(document.getElementById('adherenceChart'), {
                type: 'line',
                data: { labels: names, datasets: [{ label: 'Adherence Rate (%)', data: adherence, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.4 }] },
                options: { scales: { y: { beginAtZero: true, max: 100 } } }
            });

            if (charts.topPerformersChart) charts.topPerformersChart.destroy();
            charts.topPerformersChart = new Chart(document.getElementById('topPerformersChart'), {
                type: 'pie',
                data: { labels: names, datasets: [{ data: scores, backgroundColor: colors }] },
                options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
            });
        }

        function applyFilters() {
            let filtered = [...employees];
            const titleFilter = document.getElementById('filterTitle').value;
            if (titleFilter !== 'all') filtered = filtered.filter(emp => emp.title === titleFilter);

            const sortBy = document.getElementById('sortBy').value;
            if (sortBy === 'name') filtered.sort((a, b) => a.name.localeCompare(b.name));
            if (sortBy === 'score') filtered.sort((a, b) => b.score - a.score);
            if (sortBy === 'tasks') filtered.sort((a, b) => b.tasks - a.tasks);
            if (sortBy === 'adherence') filtered.sort((a, b) => b.adherence - a.adherence);

            currentEmployees = filtered;
            updateDashboard();
        }

        function resetFilters() {
            document.getElementById('sortBy').value = 'name';
            document.getElementById('filterTitle').value = 'all';
            currentEmployees = [...employees];
            updateDashboard();
        }

        function updateDashboard() {
            updateKPIs();
            renderTable();
            updateCharts();
        }

        // Initialize everything
        loadLogo();
        updateDashboard();
    </script>
</body>
</html>
